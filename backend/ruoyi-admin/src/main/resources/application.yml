# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.1
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: /Users/wanghaotian/Downloads/ruoyi-ai-mvp/.runtime/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 6039
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 50MB
      # 设置总上传的文件大小
      max-request-size: 60MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置
    redis:
      # 地址
      host: 127.0.0.1
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: com.ruoyi.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# FastGPT 配置
fastgpt:
  # FastGPT 总开关
  enabled: true
  # FastGPT OpenAPI 根地址
  base-url: http://localhost:3000/api
  # FastGPT 应用特定 API Key（通过环境变量注入）
  api-key: fastgpt-mmJ1RUXOWfyTT7WQWlFYlreAWph2qmACvVzdy3Yr3aSdfpEqT1ZpSWq5IpY
  # 带依据文件场景使用的 FastGPT 应用特定 API Key
  basis-api-key: fastgpt-iZMrQbNjcGlNepHEBRo0BXCDgCqPP8GpUt4hgMrCSce0Hn96DbFCRAIp5
  # 主报告正文预处理工作流使用的 FastGPT 应用特定 API Key
  preprocess-api-key: fastgpt-erHrfDKoveEt78GrrjRW96zhtSSShPYP3G7Op8WqTZAxwR6kqLw8Ur0nSqgnbYrfk
  # FastGPT 服务可访问的后端文件公开地址，用于将 /profile/... 转为完整 URL
  public-file-base-url: http://172.18.0.1:6039
  # 连接超时时间（毫秒）
  connect-timeout: 10000
  # 读取超时时间（毫秒）
  read-timeout: 900000
  # 是否使用流式响应
  stream: false
  # 是否返回节点详情
  detail: false
  # 默认审核标准
  default-audit-standard: GB/T 5751-2014
  # 最大并发任务数
  max-running-tasks: 3

# 审核文件库向量化配置
vector:
  # 阶段 1 默认关闭，避免未部署 PostgreSQL/pgvector 时影响现有业务启动
  enabled: true
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/audit_vector
    username: audit_vector_user
    password: 301836
    driver-class-name: org.postgresql.Driver
  chunk:
    max-chars: 1200
    overlap-chars: 150
    min-chars: 80
  embedding:
    provider: aliyun-bailian
    api-mode: openai-compatible
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: sk-c5e08c4a48354a9489bebd11810a229a
    model: text-embedding-v4
    dimensions: 1024
    batch-size: 16
    connect-timeout: 10000
    read-timeout: 60000
  task:
    enabled: true
    fixed-delay: 10000
    batch-size: 3
    max-running: 2
  lifecycle:
    enabled: true
  chat:
    provider: aliyun-bailian
    api-mode: openai-compatible
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen-plus
